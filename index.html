<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Defect Voice Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .voice-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 60px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .voice-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .voice-button:active {
            transform: scale(0.95);
        }

        .voice-button.listening {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            min-height: 24px;
        }

        .status.listening {
            color: #f5576c;
            font-weight: bold;
        }

        .transcript {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            min-height: 60px;
            color: #333;
            font-size: 14px;
        }

        .transcript.empty {
            color: #999;
            font-style: italic;
        }

        .response {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            color: #2e7d32;
            font-size: 14px;
        }

        .response.show {
            display: block;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            color: #c62828;
            font-size: 14px;
        }

        .error.show {
            display: block;
        }

        .config {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .config label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .config input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .examples {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .examples h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .examples ul {
            list-style: none;
            padding-left: 0;
        }

        .examples li {
            padding: 5px 0;
            color: #888;
            font-size: 13px;
        }

        .examples li:before {
            content: "💬 ";
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Quality Defect Scanner</h1>
        <p class="subtitle">Voice-Activated Quality Control</p>

        <button class="voice-button" id="voiceButton">🎤</button>
        
        <div class="status" id="status">Click the microphone to start</div>
        
        <div class="transcript empty" id="transcript">
            Your voice command will appear here...
        </div>

        <div class="response" id="response"></div>
        <div class="error" id="error"></div>

        <div class="examples">
            <h3>Try saying:</h3>
            <ul>
                <li>"Scan for quality defects in the last 24 hours"</li>
                <li>"Check quality issues"</li>
                <li>"Show me defect problems"</li>
            </ul>
        </div>

        <div class="config">
            <label for="webhookUrl">n8n Webhook URL:</label>
            <input 
                type="text" 
                id="webhookUrl" 
                placeholder="https://your-n8n-instance.com/webhook/voice-quality-scan"
                value="http://localhost:5678/webhook/voice-updated-quality-scan"
            >
        </div>
    </div>

    <script src="voice-scanner.js"></script>
</body>
</html>
